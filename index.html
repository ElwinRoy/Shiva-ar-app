<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shiva AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      object-fit: cover !important;
      z-index: 1 !important;
    }

    canvas.a-canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 2 !important;
    }

    #status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 0, 0, 0.75);
      color: #f4a800;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(244, 168, 0, 0.3);
      transition: opacity 0.5s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #status.hidden { opacity: 0; }
  </style>
</head>

<body>

  <div id="status">🙏 Starting Camera...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets timeout="60000">
      <a-asset-item id="shiva" src="./shiva.glb"></a-asset-item>
      <a-asset-item id="sun"   src="./sun.glb"></a-asset-item>
      <a-asset-item id="tech"  src="./tech.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient"     color="#ffffff" intensity="2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="3"   position="0 3 2"></a-light>
    <a-light type="directional" color="#ffe0b0" intensity="1.5" position="-2 1 -1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔵 Tech base -->
      <a-entity position="0 0 0.15" rotation="90 0 0">
        <a-gltf-model
          id="tech-model"
          src="#tech"
          position="0 -0.18 0"
          rotation="0 0 0"
          scale="0.02 0.02 0.02"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ☀️ Sun — behind head -->
      <a-entity position="0 0 0.05" rotation="90 0 0">
        <a-gltf-model
          id="sun-model"
          src="#sun"
          position="0 0.18 -0.25"
          rotation="0 270 0"
          scale="0.022 0.022 0.022"
          animation="property: rotation; from: 0 270 0; to: 0 630 0; loop: true; dur: 8000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- 🙏 Shiva — popup wrapper handles emerge animation -->
      <!-- Starts at scale 0 and position below marker, rises up and scales to full -->
      <a-entity
        id="shiva-wrapper"
        position="0 0 0"
        scale="0 0 0"
      >
        <a-entity position="0 0 0.15" rotation="90 0 0">
          <a-gltf-model
            id="shiva-model"
            src="#shiva"
            position="0 0 0"
            rotation="0 270 0"
            scale="0.5 0.5 0.5"
          ></a-gltf-model>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    const statusEl     = document.getElementById("status");
    const scene        = document.querySelector("a-scene");
    const modelEl      = document.getElementById("shiva-model");
    const sunEl        = document.getElementById("sun-model");
    const techEl       = document.getElementById("tech-model");
    const shivaWrapper = document.getElementById("shiva-wrapper");
    const targetEl     = document.querySelector("[mindar-image-target]");

    function showStatus(text) {
      statusEl.textContent = text;
      statusEl.classList.remove("hidden");
    }

    // ── Popup animation triggered on targetFound ──────────────────────────
    function playPopupAnimation() {
      // Reset to hidden below marker
      shivaWrapper.setAttribute("scale",    "0 0 0");
      shivaWrapper.setAttribute("position", "0 0 -0.05");

      // Small delay so reset takes effect before animating
      setTimeout(() => {

        // Step 1 — scale up from 0 to slightly overshooting (0 → 1.1)
        shivaWrapper.setAttribute("animation__scale", `
          property: scale;
          from: 0 0 0;
          to: 1.1 1.1 1.1;
          dur: 700;
          easing: easeOutCubic;
          startEvents: startPopup;
        `);

        // Step 2 — settle back to 1 (bounce-back feel)
        shivaWrapper.setAttribute("animation__settle", `
          property: scale;
          from: 1.1 1.1 1.1;
          to: 1 1 1;
          dur: 250;
          easing: easeInOutQuad;
          delay: 700;
          startEvents: startPopup;
        `);

        // Step 3 — rise up from slightly below marker to final position
        shivaWrapper.setAttribute("animation__rise", `
          property: position;
          from: 0 0 -0.08;
          to: 0 0 0;
          dur: 700;
          easing: easeOutCubic;
          startEvents: startPopup;
        `);

        // Fire all three together
        shivaWrapper.emit("startPopup");

      }, 50);
    }

    // ── Model events ──────────────────────────────────────────────────────
    if (modelEl) {
      modelEl.addEventListener("model-loaded", () => {
        showStatus("✅ Model loaded — scan the marker!");
        console.log("✅ Shiva GLB loaded");
      });
      modelEl.addEventListener("model-error", (e) => {
        showStatus("❌ Shiva model failed to load");
        console.error("Shiva model error:", e);
      });
    }

    if (sunEl) {
      sunEl.addEventListener("model-loaded", () => console.log("✅ Sun GLB loaded"));
      sunEl.addEventListener("model-error",  (e) => console.error("Sun error:", e));
    }

    if (techEl) {
      techEl.addEventListener("model-loaded", () => console.log("✅ Tech base GLB loaded"));
      techEl.addEventListener("model-error",  (e) => console.error("Tech error:", e));
    }

    // ── Target found / lost ───────────────────────────────────────────────
    if (targetEl) {
      targetEl.addEventListener("targetFound", () => {
        showStatus("🙏 Om Namah Shivaya!");
        setTimeout(() => statusEl.classList.add("hidden"), 3000);
        playPopupAnimation(); // 🔥 Trigger emerge animation
      });

      targetEl.addEventListener("targetLost", () => {
        showStatus("🔍 Point camera at the marker...");
        // Hide Shiva when marker is lost so it re-animates next time
        shivaWrapper.setAttribute("scale", "0 0 0");
      });
    }

    // ── AR ready / error ──────────────────────────────────────────────────
    if (scene) {
      scene.addEventListener("arReady", () => {
        showStatus("📷 Camera ready — scan the marker!");
        console.log("✅ AR ready, camera active");
      });
      scene.addEventListener("arError", (e) => {
        showStatus("❌ Camera failed — allow permission & use HTTPS");
        console.error("AR Error:", e);
      });
    }
  </script>

</body>
</html>
