<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shiva AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; }
    canvas.a-canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 2 !important; }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: rgba(0,0,0,0.75); color: #f4a800;
      padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px; backdrop-filter: blur(6px);
      border: 1px solid rgba(244,168,0,0.3); transition: opacity 0.5s ease;
      pointer-events: none; white-space: nowrap;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div id="status">🙏 Starting Camera...</div>

  <script>
    // ── Golden revolving ring/halo component ─────────────────────────────
    AFRAME.registerComponent('golden-halo', {
      schema: {
        active:      { type: 'boolean', default: false  },
        ringRadius:  { type: 'number',  default: 0.13   }, // size of ring
        tubeRadius:  { type: 'number',  default: 0.008  }, // thickness
        speed:       { type: 'number',  default: 1.2    }, // rotation speed
        glowSpeed:   { type: 'number',  default: 1.8    }, // pulse speed
      },

      init() {
        this.rings    = [];
        this.time     = 0;
        this.group    = new THREE.Group();
        this.el.object3D.add(this.group);
        this._buildRings();
      },

      _buildRings() {
        // Main golden ring
        this._addRing(0.13,  0.009, 0xffaa00, 1.0,  0,    0); // main gold
        this._addRing(0.13,  0.004, 0xffdd55, 0.7,  0,    0); // inner glow lighter
        this._addRing(0.135, 0.003, 0xff6600, 0.5,  0,    0); // outer ember

        // Second tilted ring (like in image — slightly angled)
        this._addRing(0.12,  0.006, 0xffbb00, 0.6,  15,   0); // tilted ring 1
        this._addRing(0.12,  0.006, 0xffbb00, 0.6, -15,   0); // tilted ring 2
      },

      _addRing(radius, tube, color, opacity, rotX, rotZ) {
        const geo  = new THREE.TorusGeometry(radius, tube, 12, 80);
        const mat  = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity,
          depthWrite: false,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = THREE.MathUtils.degToRad(rotX);
        mesh.rotation.z = THREE.MathUtils.degToRad(rotZ);
        mesh.userData.baseOpacity = opacity;
        this.group.add(mesh);
        this.rings.push(mesh);
      },

      tick(time, delta) {
        if (!this.data.active) return;
        this.time += delta / 1000;

        const t     = this.time;
        const speed = this.data.speed;

        // Rotate all rings around Y axis (revolving around Shiva)
        this.rings.forEach((ring, i) => {
          // Each ring rotates at slightly different speed for layered effect
          const s = speed * (1 + i * 0.08);
          ring.rotation.y += (delta / 1000) * s;

          // Pulse opacity — golden shimmer effect
          const pulse = 0.5 + 0.5 * Math.sin(t * this.data.glowSpeed + i * 1.2);
          const base  = ring.userData.baseOpacity;
          ring.material.opacity = base * (0.6 + 0.4 * pulse);
        });
      },

      setActive(val) {
        this.data.active = val;
        this.group.visible = val;
        if (!val) {
          // Reset rotations when hidden
          this.rings.forEach(r => {
            r.rotation.y = 0;
            r.material.opacity = r.userData.baseOpacity;
          });
        }
      },

      remove() {
        this.el.object3D.remove(this.group);
      }
    });
  </script>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets timeout="60000">
      <a-asset-item id="shiva" src="./shiva.glb"></a-asset-item>
      <a-asset-item id="sun"   src="./sun.glb"></a-asset-item>
      <a-asset-item id="tech"  src="./tech.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient"     color="#ffffff" intensity="2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="3"   position="0 3 2"></a-light>
    <a-light type="directional" color="#ffe0b0" intensity="1.5" position="-2 1 -1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔵 Tech base -->
      <a-entity position="0 0 0.15" rotation="90 0 0">
        <a-gltf-model
          id="tech-model"
          src="#tech"
          position="0 -0.18 0"
          rotation="0 0 0"
          scale="0.02 0.02 0.02"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ☀️ Sun — behind head -->
      <a-entity position="0 0 0.05" rotation="90 0 0">
        <a-gltf-model
          id="sun-model"
          src="#sun"
          position="0 0.18 -0.25"
          rotation="0 270 0"
          scale="0.022 0.022 0.022"
          animation="property: rotation; from: 0 270 0; to: 0 630 0; loop: true; dur: 8000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ✨ Golden halo ring — centered on Shiva's body -->
      <a-entity
        id="halo-entity"
        position="0 0.08 0.15"
        golden-halo="active: false; ringRadius: 0.13; tubeRadius: 0.008; speed: 1.2; glowSpeed: 1.8;"
      ></a-entity>

      <!-- 🙏 Shiva popup wrapper -->
      <a-entity id="shiva-wrapper" position="0 0 0" scale="0 0 0">
        <a-entity position="0 0 0.15" rotation="90 0 0">
          <a-gltf-model
            id="shiva-model"
            src="#shiva"
            position="0 0 0"
            rotation="0 270 0"
            scale="0.5 0.5 0.5"
          ></a-gltf-model>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    const statusEl     = document.getElementById("status");
    const scene        = document.querySelector("a-scene");
    const modelEl      = document.getElementById("shiva-model");
    const sunEl        = document.getElementById("sun-model");
    const techEl       = document.getElementById("tech-model");
    const shivaWrapper = document.getElementById("shiva-wrapper");
    const haloEl       = document.getElementById("halo-entity");
    const targetEl     = document.querySelector("[mindar-image-target]");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }

    function startHalo() {
      // Wait for component to be ready
      const comp = haloEl.components['golden-halo'];
      if (comp) comp.setActive(true);
    }

    function stopHalo() {
      const comp = haloEl.components['golden-halo'];
      if (comp) comp.setActive(false);
    }

    // ── Popup animation ───────────────────────────────────────────────────
    function playPopupAnimation() {
      shivaWrapper.setAttribute("scale",    "0 0 0");
      shivaWrapper.setAttribute("position", "0 0 -0.05");

      setTimeout(() => {
        shivaWrapper.setAttribute("animation__scale", `
          property: scale; from: 0 0 0; to: 1.1 1.1 1.1;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__settle", `
          property: scale; from: 1.1 1.1 1.1; to: 1 1 1;
          dur: 250; easing: easeInOutQuad; delay: 700; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__rise", `
          property: position; from: 0 0 -0.08; to: 0 0 0;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);

        shivaWrapper.emit("startPopup");

        // Halo appears as Shiva rises
        setTimeout(() => startHalo(), 400);

      }, 50);
    }

    // ── Model events ──────────────────────────────────────────────────────
    if (modelEl) {
      modelEl.addEventListener("model-loaded", () => {
        showStatus("✅ Model loaded — scan the marker!");
        console.log("✅ Shiva GLB loaded");
      });
      modelEl.addEventListener("model-error", (e) => {
        showStatus("❌ Shiva model failed to load");
        console.error("Shiva model error:", e);
      });
    }

    if (sunEl) {
      sunEl.addEventListener("model-loaded", () => console.log("✅ Sun GLB loaded"));
      sunEl.addEventListener("model-error",  (e) => console.error("Sun error:", e));
    }

    if (techEl) {
      techEl.addEventListener("model-loaded", () => console.log("✅ Tech base GLB loaded"));
      techEl.addEventListener("model-error",  (e) => console.error("Tech error:", e));
    }

    // ── Target found / lost ───────────────────────────────────────────────
    if (targetEl) {
      targetEl.addEventListener("targetFound", () => {
        showStatus("🙏 Om Namah Shivaya!");
        setTimeout(() => statusEl.classList.add("hidden"), 3000);
        playPopupAnimation();
      });

      targetEl.addEventListener("targetLost", () => {
        showStatus("🔍 Point camera at the marker...");
        shivaWrapper.setAttribute("scale", "0 0 0");
        stopHalo();
      });
    }

    // ── AR ready / error ──────────────────────────────────────────────────
    if (scene) {
      scene.addEventListener("arReady", () => {
        showStatus("📷 Camera ready — scan the marker!");
        console.log("✅ AR ready, camera active");
      });
      scene.addEventListener("arError", (e) => {
        showStatus("❌ Camera failed — allow permission & use HTTPS");
        console.error("AR Error:", e);
      });
    }
  </script>

</body>
</html>
