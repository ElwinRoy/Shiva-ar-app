<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shiva AR</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  *, html, body { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  a-scene { position:fixed; top:0; left:0; width:100%; height:100%; }

  #status {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:9999; background:rgba(0,0,0,0.8); color:#f4a800;
    padding:10px 20px; border-radius:30px; font-size:13px;
    text-align:center; max-width:90vw;
  }

  #controls {
    position:fixed; bottom:0; left:0; right:0; z-index:9999;
    background:rgba(0,0,0,0.85); padding:12px 16px;
    display:flex; flex-direction:column; gap:8px;
  }
  .ctrl-row { display:flex; align-items:center; gap:10px; }
  .ctrl-row label { color:#f4a800; font-size:11px; width:80px; flex-shrink:0; }
  .ctrl-row input[type=range] { flex:1; accent-color:#f4a800; }
  .ctrl-row span { color:#fff; font-size:11px; width:60px; text-align:right; flex-shrink:0; }
  #controls button {
    background:#f4a800; border:none; border-radius:20px;
    padding:8px; color:#000; font-weight:700; font-size:12px; cursor:pointer;
  }
</style>
</head>
<body>

<div id="status">Loading…</div>

<div id="controls">
  <div class="ctrl-row">
    <label>Scale</label>
    <input type="range" id="sl-scale" min="0.01" max="3" step="0.01" value="0.8">
    <span id="lbl-scale">0.80</span>
  </div>
  <div class="ctrl-row">
    <label>Y offset</label>
    <input type="range" id="sl-y" min="-2" max="3" step="0.01" value="0">
    <span id="lbl-y">0.00</span>
  </div>
  <div class="ctrl-row">
    <label>Rotation X</label>
    <input type="range" id="sl-rx" min="-180" max="180" step="1" value="0">
    <span id="lbl-rx">0</span>
  </div>
  <button onclick="logValues()">📋 Log values</button>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
  embedded
  color-space="sRGB"
  renderer="colorManagement:true; physicallyCorrectLights:true;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
>
  <a-assets timeout="30000">
    <a-asset-item id="shiva" src="./shiva.glb"></a-asset-item>
  </a-assets>

  <a-light type="ambient" color="#ffffff" intensity="2"></a-light>
  <a-light type="directional" color="#ffffff" intensity="3" position="1 3 2"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- ✅ TEST BOX — always visible when marker is detected.
         If you see this golden box floating on your image, the anchor is working.
         Once model appears, you can remove this box. -->
    <a-box id="test-box"
      width="0.3" height="0.3" depth="0.3"
      position="0 0.15 0"
      color="#f4a800"
      material="emissive:#f4a800; emissiveIntensity:1.5; opacity:0.9;">
    </a-box>

    <!-- Your 3D model -->
    <a-entity
      id="model"
      gltf-model="#shiva"
      position="0 0 0"
      rotation="0 180 0"
      scale="0.8 0.8 0.8"
      visible="true"
    ></a-entity>

  </a-entity>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
</a-scene>

<script>
  const statusEl = document.getElementById('status');
  const model = document.getElementById('model');

  // ── Model loading ─────────────────────────────────────────────
  model.addEventListener('model-loaded', () => {
    const mesh = model.getObject3D('mesh');
    if (!mesh) {
      statusEl.textContent = '⚠️ Mesh not found after load';
      return;
    }

    setTimeout(() => {
      mesh.scale.set(1, 1, 1);
      const box = new THREE.Box3().setFromObject(mesh);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // Target: fit model in ~0.9 units (marker ≈ 1 unit wide)
      const TARGET = 0.9;
      const rawMax = Math.max(size.x, size.y, size.z);
      const autoScale = TARGET / rawMax;
      const offsetY = -center.y * autoScale + (size.y * autoScale * 0.5);

      model.setAttribute('scale', `${autoScale} ${autoScale} ${autoScale}`);
      model.setAttribute('position', `0 ${offsetY} 0`);

      document.getElementById('sl-scale').value = autoScale;
      document.getElementById('lbl-scale').textContent = autoScale.toFixed(2);
      document.getElementById('sl-y').value = offsetY;
      document.getElementById('lbl-y').textContent = offsetY.toFixed(2);

      statusEl.innerHTML = `✅ Model loaded | scale:${autoScale.toFixed(3)} y:${offsetY.toFixed(3)}<br>Scan the marker!`;
      console.log('Model size:', size);
      console.log('Auto scale:', autoScale, '| Y offset:', offsetY);
    }, 200);
  });

  model.addEventListener('model-error', (e) => {
    statusEl.innerHTML = '❌ GLB load failed! Check shiva.glb path.<br>' + JSON.stringify(e.detail);
    console.error('model-error:', e.detail);
  });

  // ── Sliders ───────────────────────────────────────────────────
  function bindSlider(id, lblId, fn) {
    const sl = document.getElementById(id);
    const lb = document.getElementById(lblId);
    sl.addEventListener('input', () => {
      lb.textContent = parseFloat(sl.value).toFixed(2);
      fn(parseFloat(sl.value));
    });
  }

  bindSlider('sl-scale', 'lbl-scale', v => model.setAttribute('scale', `${v} ${v} ${v}`));
  bindSlider('sl-y', 'lbl-y', v => {
    const p = model.getAttribute('position');
    model.setAttribute('position', `${p.x} ${v} ${p.z}`);
  });
  bindSlider('sl-rx', 'lbl-rx', v => {
    const r = model.getAttribute('rotation');
    model.setAttribute('rotation', `${v} ${r.y} ${r.z}`);
  });

  function logValues() {
    const s = model.getAttribute('scale');
    const p = model.getAttribute('position');
    const r = model.getAttribute('rotation');
    const msg = `scale="${s.x.toFixed(3)} ${s.y.toFixed(3)} ${s.z.toFixed(3)}" position="${p.x.toFixed(3)} ${p.y.toFixed(3)} ${p.z.toFixed(3)}" rotation="${r.x} ${r.y} ${r.z}"`;
    console.log(msg);
    statusEl.textContent = msg;
  }

  // ── Marker events ─────────────────────────────────────────────
  document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => {
    statusEl.textContent = '🔱 Shiva Appeared!';
  });
  document.querySelector('[mindar-image-target]').addEventListener('targetLost', () => {
    statusEl.textContent = 'Scan the marker…';
  });
</script>
</body>
</html>
