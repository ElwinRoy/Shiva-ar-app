<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shiva AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; }
    canvas.a-canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 2 !important; }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: rgba(0,0,0,0.75); color: #f4a800;
      padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px; backdrop-filter: blur(6px);
      border: 1px solid rgba(244,168,0,0.3); transition: opacity 0.5s ease;
      pointer-events: none; white-space: nowrap;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div id="status">🙏 Starting Camera...</div>

  <script>
    // ── Golden Orbiting Ring component ───────────────────────────────────
    AFRAME.registerComponent('golden-ring', {
      schema: {
        active:       { type: 'boolean', default: false },
        // Ring geometry
        ringRadius:   { type: 'number', default: 0.18 },   // orbit radius around Shiva
        tubeRadius:   { type: 'number', default: 0.012 },  // thickness of the torus
        // Glow particles along the ring
        glowCount:    { type: 'int',    default: 60 },
        // Tilt of the ring plane (degrees) — tilted like in the image
        tiltX:        { type: 'number', default: 15 },
        tiltZ:        { type: 'number', default: 5  },
      },

      init() {
        this.group      = new THREE.Group();
        this.ringMesh   = null;
        this.glowMeshes = [];
        this.time       = 0;
        this.active     = false;

        this.el.object3D.add(this.group);
        this._buildRing();
        this._buildGlowParticles();
      },

      _buildRing() {
        const { ringRadius, tubeRadius, tiltX, tiltZ } = this.data;

        // Main torus — golden metallic look
        const geo = new THREE.TorusGeometry(ringRadius, tubeRadius, 16, 100);
        const mat = new THREE.MeshStandardMaterial({
          color:        new THREE.Color('#FFD700'),
          emissive:     new THREE.Color('#FF8C00'),
          emissiveIntensity: 1.2,
          metalness:    0.9,
          roughness:    0.1,
          transparent:  true,
          opacity:      0,
        });

        this.ringMesh = new THREE.Mesh(geo, mat);
        // Tilt to match the image — slightly angled, not perfectly vertical
        this.ringMesh.rotation.x = THREE.MathUtils.degToRad(tiltX);
        this.ringMesh.rotation.z = THREE.MathUtils.degToRad(tiltZ);
        this.group.add(this.ringMesh);

        // Outer glow ring (slightly larger, more transparent)
        const glowGeo = new THREE.TorusGeometry(ringRadius, tubeRadius * 2.8, 8, 100);
        const glowMat = new THREE.MeshBasicMaterial({
          color:       new THREE.Color('#FFA500'),
          transparent: true,
          opacity:     0,
          depthWrite:  false,
          side:        THREE.DoubleSide,
        });
        this.outerGlow = new THREE.Mesh(glowGeo, glowMat);
        this.outerGlow.rotation.x = THREE.MathUtils.degToRad(tiltX);
        this.outerGlow.rotation.z = THREE.MathUtils.degToRad(tiltZ);
        this.group.add(this.outerGlow);
      },

      _buildGlowParticles() {
        const { glowCount, ringRadius, tiltX, tiltZ } = this.data;
        const tiltXRad = THREE.MathUtils.degToRad(tiltX);
        const tiltZRad = THREE.MathUtils.degToRad(tiltZ);

        for (let i = 0; i < glowCount; i++) {
          const angle = (i / glowCount) * Math.PI * 2;

          // Base size varies — creates sparkle effect
          const size  = 0.006 + Math.random() * 0.010;
          const geo   = new THREE.SphereGeometry(size, 5, 5);

          // Alternate between warm gold and orange glow colours
          const isGold = Math.random() > 0.35;
          const mat = new THREE.MeshBasicMaterial({
            color:       new THREE.Color(isGold ? '#FFD700' : '#FF6600'),
            transparent: true,
            opacity:     0,
            depthWrite:  false,
          });

          const mesh = new THREE.Mesh(geo, mat);

          // Position on torus path
          const x = Math.cos(angle) * this.data.ringRadius;
          const y = Math.sin(angle) * this.data.ringRadius;
          // Apply same tilt as ring
          const cosX = Math.cos(tiltXRad), sinX = Math.sin(tiltXRad);
          const cosZ = Math.cos(tiltZRad), sinZ = Math.sin(tiltZRad);

          // Rotate point: first X then Z
          const y1 = y * cosX;
          const z1 = y * sinX;
          const x2 = x * cosZ - z1 * sinZ;
          const z2 = x * sinZ + z1 * cosZ;

          mesh.position.set(x2, y1, z2);

          this.group.add(mesh);
          this.glowMeshes.push({
            mesh,
            angle,       // current angle on orbit
            baseAngle: angle,
            orbitSpeed: 0.8 + Math.random() * 0.4,  // slightly varied speeds for shimmer
            pulsePeriod: 1.5 + Math.random() * 1.5,
            pulseOffset: Math.random() * Math.PI * 2,
          });
        }
      },

      tick(time, delta) {
        if (!this.active) return;
        const dt = delta / 1000;
        this.time += dt;

        const t = this.time;
        const { ringRadius, tiltX, tiltZ } = this.data;
        const tiltXRad = THREE.MathUtils.degToRad(tiltX);
        const tiltZRad = THREE.MathUtils.degToRad(tiltZ);

        // Spin the whole ring group slowly
        this.group.rotation.y = t * 0.6;

        // Pulse emissive intensity on the main ring
        if (this.ringMesh) {
          const pulse = 0.8 + 0.6 * Math.sin(t * 2.0);
          this.ringMesh.material.emissiveIntensity = pulse;
        }

        // Pulse outer glow opacity
        if (this.outerGlow) {
          this.outerGlow.material.opacity = 0.08 + 0.06 * Math.sin(t * 1.8);
        }

        // Update glow sparkle particles
        this.glowMeshes.forEach(p => {
          // Each particle orbits at slightly different speed → shimmer
          p.angle += p.orbitSpeed * dt;

          const x = Math.cos(p.angle) * ringRadius;
          const y = Math.sin(p.angle) * ringRadius;

          // Apply tilt
          const cosX = Math.cos(tiltXRad), sinX = Math.sin(tiltXRad);
          const cosZ = Math.cos(tiltZRad), sinZ = Math.sin(tiltZRad);
          const y1 = y * cosX;
          const z1 = y * sinX;
          const x2 = x * cosZ - z1 * sinZ;
          const z2 = x * sinZ + z1 * cosZ;

          p.mesh.position.set(x2, y1, z2);

          // Pulse opacity for sparkle
          const pulse = 0.5 + 0.5 * Math.sin(t / p.pulsePeriod * Math.PI * 2 + p.pulseOffset);
          p.mesh.material.opacity = 0.4 + 0.6 * pulse;

          // Slight scale pulse
          const s = 0.8 + 0.5 * pulse;
          p.mesh.scale.set(s, s, s);
        });
      },

      setActive(val) {
        this.active = val;
        const targetOpacity = val ? 1.0 : 0;
        const glowTarget    = val ? 0.12 : 0;

        if (this.ringMesh)  this.ringMesh.material.opacity  = targetOpacity;
        if (this.outerGlow) this.outerGlow.material.opacity = glowTarget;

        if (!val) {
          // Reset rotation
          this.group.rotation.y = 0;
          this.glowMeshes.forEach(p => {
            p.mesh.material.opacity = 0;
            p.angle = p.baseAngle;
          });
        } else {
          this.glowMeshes.forEach(p => {
            p.angle = p.baseAngle;
          });
        }
      },

      remove() {
        this.el.object3D.remove(this.group);
      }
    });
  </script>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets timeout="60000">
      <a-asset-item id="shiva" src="./shiva.glb"></a-asset-item>
      <a-asset-item id="sun"   src="./sun.glb"></a-asset-item>
      <a-asset-item id="tech"  src="./tech.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient"     color="#ffffff" intensity="2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="3"   position="0 3 2"></a-light>
    <a-light type="directional" color="#ffe0b0" intensity="1.5" position="-2 1 -1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔵 Tech base -->
      <a-entity position="0 0 0.15" rotation="90 0 0">
        <a-gltf-model
          id="tech-model"
          src="#tech"
          position="0 -0.18 0"
          rotation="0 0 0"
          scale="0.02 0.02 0.02"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ☀️ Sun -->
      <a-entity position="0 0 0.05" rotation="90 0 0">
        <a-gltf-model
          id="sun-model"
          src="#sun"
          position="0 0.18 -0.25"
          rotation="0 270 0"
          scale="0.022 0.022 0.022"
          animation="property: rotation; from: 0 270 0; to: 0 630 0; loop: true; dur: 8000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ✨ Golden Ring — centered on Shiva's body -->
      <a-entity
        id="ring-entity"
        position="0 0.05 0.15"
        golden-ring="active: false; ringRadius: 0.18; tubeRadius: 0.012; glowCount: 60; tiltX: 15; tiltZ: 5;"
      ></a-entity>

      <!-- 🙏 Shiva popup wrapper -->
      <a-entity id="shiva-wrapper" position="0 0 0" scale="0 0 0">
        <a-entity position="0 0 0.15" rotation="90 0 0">
          <a-gltf-model
            id="shiva-model"
            src="#shiva"
            position="0 0 0"
            rotation="0 270 0"
            scale="0.5 0.5 0.5"
          ></a-gltf-model>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    const statusEl     = document.getElementById("status");
    const scene        = document.querySelector("a-scene");
    const modelEl      = document.getElementById("shiva-model");
    const sunEl        = document.getElementById("sun-model");
    const techEl       = document.getElementById("tech-model");
    const shivaWrapper = document.getElementById("shiva-wrapper");
    const ringEl       = document.getElementById("ring-entity");
    const targetEl     = document.querySelector("[mindar-image-target]");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }

    function startRing() {
      ringEl.components['golden-ring'].setActive(true);
    }

    function stopRing() {
      ringEl.components['golden-ring'].setActive(false);
    }

    // ── Popup animation ───────────────────────────────────────────────────
    function playPopupAnimation() {
      shivaWrapper.setAttribute("scale",    "0 0 0");
      shivaWrapper.setAttribute("position", "0 0 -0.05");

      setTimeout(() => {
        shivaWrapper.setAttribute("animation__scale", `
          property: scale; from: 0 0 0; to: 1.1 1.1 1.1;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__settle", `
          property: scale; from: 1.1 1.1 1.1; to: 1 1 1;
          dur: 250; easing: easeInOutQuad; delay: 700; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__rise", `
          property: position; from: 0 0 -0.08; to: 0 0 0;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);

        shivaWrapper.emit("startPopup");

        // Golden ring appears as Shiva rises
        setTimeout(() => startRing(), 300);

      }, 50);
    }

    // ── Model events ──────────────────────────────────────────────────────
    if (modelEl) {
      modelEl.addEventListener("model-loaded", () => {
        showStatus("✅ Model loaded — scan the marker!");
        console.log("✅ Shiva GLB loaded");
      });
      modelEl.addEventListener("model-error", (e) => {
        showStatus("❌ Shiva model failed to load");
        console.error("Shiva model error:", e);
      });
    }

    if (sunEl) {
      sunEl.addEventListener("model-loaded", () => console.log("✅ Sun GLB loaded"));
      sunEl.addEventListener("model-error",  (e) => console.error("Sun error:", e));
    }

    if (techEl) {
      techEl.addEventListener("model-loaded", () => console.log("✅ Tech base GLB loaded"));
      techEl.addEventListener("model-error",  (e) => console.error("Tech error:", e));
    }

    // ── Target found / lost ───────────────────────────────────────────────
    if (targetEl) {
      targetEl.addEventListener("targetFound", () => {
        showStatus("🙏 Om Namah Shivaya!");
        setTimeout(() => statusEl.classList.add("hidden"), 3000);
        playPopupAnimation();
      });

      targetEl.addEventListener("targetLost", () => {
        showStatus("🔍 Point camera at the marker...");
        shivaWrapper.setAttribute("scale", "0 0 0");
        stopRing();
      });
    }

    // ── AR ready / error ──────────────────────────────────────────────────
    if (scene) {
      scene.addEventListener("arReady", () => {
        showStatus("📷 Camera ready — scan the marker!");
        console.log("✅ AR ready, camera active");
      });
      scene.addEventListener("arError", (e) => {
        showStatus("❌ Camera failed — allow permission & use HTTPS");
        console.error("AR Error:", e);
      });
    }
  </script>

</body>
</html>
