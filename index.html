<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shiva AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; }
    canvas.a-canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 2 !important; }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: rgba(0,0,0,0.75); color: #f4a800;
      padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px; backdrop-filter: blur(6px);
      border: 1px solid rgba(244,168,0,0.3); transition: opacity 0.5s ease;
      pointer-events: none; white-space: nowrap;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div id="status">🙏 Starting Camera...</div>

  <script>
    // ── Custom smoke component using Three.js directly ──────────────────
    AFRAME.registerComponent('smoke-effect', {
      schema: {
        active:  { type: 'boolean', default: false },
        count:   { type: 'int',     default: 40    },
        radius:  { type: 'number',  default: 0.08  },
        height:  { type: 'number',  default: 0.25  },
        color:   { type: 'color',   default: '#aaaaaa' }
      },

      init() {
        this.particles = [];
        this.group     = new THREE.Group();
        this.el.object3D.add(this.group);
        this._buildParticles();
      },

      _buildParticles() {
        const { count, color } = this.data;

        for (let i = 0; i < count; i++) {
          const size = 0.012 + Math.random() * 0.018;
          const geo  = new THREE.SphereGeometry(size, 5, 5);
          const mat  = new THREE.MeshBasicMaterial({
            color:       new THREE.Color(color),
            transparent: true,
            opacity:     0,
            depthWrite:  false,
          });
          const mesh = new THREE.Mesh(geo, mat);

          // random start position in a ring around Shiva
          const angle  = Math.random() * Math.PI * 2;
          const r      = 0.02 + Math.random() * this.data.radius;
          mesh.position.set(
            Math.cos(angle) * r,
            -0.05 + Math.random() * 0.04,   // start near feet
            Math.sin(angle) * r
          );

          this.group.add(mesh);

          // per-particle state
          this.particles.push({
            mesh,
            speed:    0.012 + Math.random() * 0.018,
            maxY:     0.12  + Math.random() * this.data.height,
            startY:   mesh.position.y,
            drift:    (Math.random() - 0.5) * 0.006,
            driftZ:   (Math.random() - 0.5) * 0.006,
            delay:    Math.random() * 2.5,   // stagger start
            age:      0,
            lifespan: 2.0 + Math.random() * 1.5,
            active:   false,
          });
        }
      },

      _resetParticle(p) {
        const angle = Math.random() * Math.PI * 2;
        const r     = 0.02 + Math.random() * this.data.radius;
        p.mesh.position.set(
          Math.cos(angle) * r,
          -0.05 + Math.random() * 0.03,
          Math.sin(angle) * r
        );
        p.startY    = p.mesh.position.y;
        p.mesh.material.opacity = 0;
        p.mesh.scale.set(1, 1, 1);
        p.age       = 0;
        p.lifespan  = 2.0 + Math.random() * 1.5;
        p.speed     = 0.012 + Math.random() * 0.018;
        p.drift     = (Math.random() - 0.5) * 0.006;
        p.driftZ    = (Math.random() - 0.5) * 0.006;
        p.active    = false;
        p.delay     = Math.random() * 1.0;
      },

      tick(time, delta) {
        if (!this.data.active) return;
        const dt = delta / 1000; // seconds

        this.particles.forEach(p => {
          // count down delay before particle activates
          if (!p.active) {
            p.delay -= dt;
            if (p.delay <= 0) p.active = true;
            return;
          }

          p.age += dt;
          const progress = p.age / p.lifespan; // 0 → 1

          if (progress >= 1) {
            this._resetParticle(p);
            return;
          }

          // rise upward
          p.mesh.position.y += p.speed * dt;
          p.mesh.position.x += p.drift;
          p.mesh.position.z += p.driftZ;

          // grow as it rises
          const s = 1 + progress * 2.5;
          p.mesh.scale.set(s, s, s);

          // fade: rise in → fade out
          let opacity;
          if (progress < 0.2) {
            opacity = progress / 0.2 * 0.5;       // fade in
          } else {
            opacity = (1 - progress) * 0.5;        // fade out
          }
          p.mesh.material.opacity = opacity;
        });
      },

      // called externally to start/stop
      setActive(val) {
        this.data.active = val;
        if (!val) {
          // instantly hide all
          this.particles.forEach(p => {
            p.mesh.material.opacity = 0;
            this._resetParticle(p);
          });
        }
      },

      remove() {
        this.el.object3D.remove(this.group);
      }
    });
  </script>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets timeout="60000">
      <a-asset-item id="shiva" src="./shiva.glb"></a-asset-item>
      <a-asset-item id="sun"   src="./sun.glb"></a-asset-item>
      <a-asset-item id="tech"  src="./tech.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient"     color="#ffffff" intensity="2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="3"   position="0 3 2"></a-light>
    <a-light type="directional" color="#ffe0b0" intensity="1.5" position="-2 1 -1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔵 Tech base -->
      <a-entity position="0 0 0.15" rotation="90 0 0">
        <a-gltf-model
          id="tech-model"
          src="#tech"
          position="0 -0.18 0"
          rotation="0 0 0"
          scale="0.02 0.02 0.02"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ☀️ Sun -->
      <a-entity position="0 0 0.05" rotation="90 0 0">
        <a-gltf-model
          id="sun-model"
          src="#sun"
          position="0 0.18 -0.25"
          rotation="0 270 0"
          scale="0.022 0.022 0.022"
          animation="property: rotation; from: 0 270 0; to: 0 630 0; loop: true; dur: 8000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- 💨 Smoke — sits at Shiva's base level -->
      <a-entity
        id="smoke-entity"
        position="0 0.02 0.15"
        smoke-effect="active: false; count: 40; radius: 0.08; height: 0.25; color: #aaaaaa;"
      ></a-entity>

      <!-- 🙏 Shiva popup wrapper -->
      <a-entity id="shiva-wrapper" position="0 0 0" scale="0 0 0">
        <a-entity position="0 0 0.15" rotation="90 0 0">
          <a-gltf-model
            id="shiva-model"
            src="#shiva"
            position="0 0 0"
            rotation="0 270 0"
            scale="0.5 0.5 0.5"
          ></a-gltf-model>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    const statusEl     = document.getElementById("status");
    const scene        = document.querySelector("a-scene");
    const modelEl      = document.getElementById("shiva-model");
    const sunEl        = document.getElementById("sun-model");
    const techEl       = document.getElementById("tech-model");
    const shivaWrapper = document.getElementById("shiva-wrapper");
    const smokeEl      = document.getElementById("smoke-entity");
    const targetEl     = document.querySelector("[mindar-image-target]");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }

    function startSmoke() {
      smokeEl.components['smoke-effect'].setActive(true);
    }

    function stopSmoke() {
      smokeEl.components['smoke-effect'].setActive(false);
    }

    // ── Popup animation ───────────────────────────────────────────────────
    function playPopupAnimation() {
      shivaWrapper.setAttribute("scale",    "0 0 0");
      shivaWrapper.setAttribute("position", "0 0 -0.05");

      setTimeout(() => {
        shivaWrapper.setAttribute("animation__scale", `
          property: scale; from: 0 0 0; to: 1.1 1.1 1.1;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__settle", `
          property: scale; from: 1.1 1.1 1.1; to: 1 1 1;
          dur: 250; easing: easeInOutQuad; delay: 700; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__rise", `
          property: position; from: 0 0 -0.08; to: 0 0 0;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);

        shivaWrapper.emit("startPopup");

        // Smoke starts as Shiva rises
        setTimeout(() => startSmoke(), 300);

      }, 50);
    }

    // ── Model events ──────────────────────────────────────────────────────
    if (modelEl) {
      modelEl.addEventListener("model-loaded", () => {
        showStatus("✅ Model loaded — scan the marker!");
        console.log("✅ Shiva GLB loaded");
      });
      modelEl.addEventListener("model-error", (e) => {
        showStatus("❌ Shiva model failed to load");
        console.error("Shiva model error:", e);
      });
    }

    if (sunEl) {
      sunEl.addEventListener("model-loaded", () => console.log("✅ Sun GLB loaded"));
      sunEl.addEventListener("model-error",  (e) => console.error("Sun error:", e));
    }

    if (techEl) {
      techEl.addEventListener("model-loaded", () => console.log("✅ Tech base GLB loaded"));
      techEl.addEventListener("model-error",  (e) => console.error("Tech error:", e));
    }

    // ── Target found / lost ───────────────────────────────────────────────
    if (targetEl) {
      targetEl.addEventListener("targetFound", () => {
        showStatus("🙏 Om Namah Shivaya!");
        setTimeout(() => statusEl.classList.add("hidden"), 3000);
        playPopupAnimation();
      });

      targetEl.addEventListener("targetLost", () => {
        showStatus("🔍 Point camera at the marker...");
        shivaWrapper.setAttribute("scale", "0 0 0");
        stopSmoke();
      });
    }

    // ── AR ready / error ──────────────────────────────────────────────────
    if (scene) {
      scene.addEventListener("arReady", () => {
        showStatus("📷 Camera ready — scan the marker!");
        console.log("✅ AR ready, camera active");
      });
      scene.addEventListener("arError", (e) => {
        showStatus("❌ Camera failed — allow permission & use HTTPS");
        console.error("AR Error:", e);
      });
    }
  </script>

</body>
</html>
