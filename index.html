<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shiva AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; }
    canvas.a-canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 2 !important; }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: rgba(0,0,0,0.75); color: #f4a800;
      padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(244,168,0,0.3); transition: opacity 0.5s ease;
      pointer-events: none; white-space: nowrap;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div id="status">🙏 Starting Camera...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets timeout="60000">
      <a-asset-item id="shiva" src="./shiva.glb"></a-asset-item>
      <a-asset-item id="sun"   src="./sun.glb"></a-asset-item>
      <a-asset-item id="tech"  src="./tech.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient"     color="#ffffff" intensity="2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="3"   position="0 3 2"></a-light>
    <a-light type="directional" color="#ffe0b0" intensity="1.5" position="-2 1 -1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔵 Tech base -->
      <a-entity position="0 0 0.15" rotation="90 0 0">
        <a-gltf-model
          id="tech-model"
          src="#tech"
          position="0 -0.18 0"
          rotation="0 0 0"
          scale="0.02 0.02 0.02"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- ☀️ Sun — behind head -->
      <a-entity position="0 0 0.05" rotation="90 0 0">
        <a-gltf-model
          id="sun-model"
          src="#sun"
          position="0 0.18 -0.25"
          rotation="0 270 0"
          scale="0.022 0.022 0.022"
          animation="property: rotation; from: 0 270 0; to: 0 630 0; loop: true; dur: 8000; easing: linear;"
        ></a-gltf-model>
      </a-entity>

      <!-- 💨 SMOKE SYSTEM — pure A-Frame, no external lib -->
      <!-- Each puff = a sphere that rises + fades using built-in animation -->
      <a-entity id="smoke-container" visible="false">

        <!-- Puff 1 — left -->
        <a-sphere id="puff1"
          position="-0.05 0.02 0.12"
          radius="0.025"
          color="#999999"
          opacity="0"
          material="transparent: true; opacity: 0; shader: flat;"
          animation__rise="property: position; from: -0.05 0.02 0.12; to: -0.07 0.15 0.12; dur: 2500; loop: true; easing: easeOutQuad;"
          animation__fade="property: components.material.material.opacity; from: 0.45; to: 0; dur: 2500; loop: true; easing: easeInQuad;"
          animation__grow="property: scale; from: 1 1 1; to: 2.5 2.5 2.5; dur: 2500; loop: true; easing: easeOutQuad;"
        ></a-sphere>

        <!-- Puff 2 — right -->
        <a-sphere id="puff2"
          position="0.05 0.02 0.12"
          radius="0.025"
          color="#888888"
          opacity="0"
          material="transparent: true; opacity: 0; shader: flat;"
          animation__rise="property: position; from: 0.05 0.02 0.12; to: 0.08 0.14 0.12; dur: 2800; loop: true; easing: easeOutQuad; delay: 400;"
          animation__fade="property: components.material.material.opacity; from: 0.4; to: 0; dur: 2800; loop: true; easing: easeInQuad; delay: 400;"
          animation__grow="property: scale; from: 1 1 1; to: 2.2 2.2 2.2; dur: 2800; loop: true; easing: easeOutQuad; delay: 400;"
        ></a-sphere>

        <!-- Puff 3 — center left -->
        <a-sphere id="puff3"
          position="-0.02 0.02 0.13"
          radius="0.02"
          color="#aaaaaa"
          opacity="0"
          material="transparent: true; opacity: 0; shader: flat;"
          animation__rise="property: position; from: -0.02 0.02 0.13; to: -0.04 0.18 0.13; dur: 3200; loop: true; easing: easeOutQuad; delay: 800;"
          animation__fade="property: components.material.material.opacity; from: 0.35; to: 0; dur: 3200; loop: true; easing: easeInQuad; delay: 800;"
          animation__grow="property: scale; from: 1 1 1; to: 3 3 3; dur: 3200; loop: true; easing: easeOutQuad; delay: 800;"
        ></a-sphere>

        <!-- Puff 4 — center right -->
        <a-sphere id="puff4"
          position="0.02 0.02 0.13"
          radius="0.02"
          color="#bbbbbb"
          opacity="0"
          material="transparent: true; opacity: 0; shader: flat;"
          animation__rise="property: position; from: 0.02 0.02 0.13; to: 0.05 0.16 0.13; dur: 2600; loop: true; easing: easeOutQuad; delay: 1200;"
          animation__fade="property: components.material.material.opacity; from: 0.4; to: 0; dur: 2600; loop: true; easing: easeInQuad; delay: 1200;"
          animation__grow="property: scale; from: 1 1 1; to: 2.8 2.8 2.8; dur: 2600; loop: true; easing: easeOutQuad; delay: 1200;"
        ></a-sphere>

        <!-- Puff 5 — far left, low -->
        <a-sphere id="puff5"
          position="-0.07 0.01 0.11"
          radius="0.018"
          color="#777777"
          opacity="0"
          material="transparent: true; opacity: 0; shader: flat;"
          animation__rise="property: position; from: -0.07 0.01 0.11; to: -0.10 0.12 0.11; dur: 3000; loop: true; easing: easeOutQuad; delay: 600;"
          animation__fade="property: components.material.material.opacity; from: 0.3; to: 0; dur: 3000; loop: true; easing: easeInQuad; delay: 600;"
          animation__grow="property: scale; from: 1 1 1; to: 2 2 2; dur: 3000; loop: true; easing: easeOutQuad; delay: 600;"
        ></a-sphere>

        <!-- Puff 6 — far right, low -->
        <a-sphere id="puff6"
          position="0.07 0.01 0.11"
          radius="0.018"
          color="#777777"
          opacity="0"
          material="transparent: true; opacity: 0; shader: flat;"
          animation__rise="property: position; from: 0.07 0.01 0.11; to: 0.10 0.13 0.11; dur: 2700; loop: true; easing: easeOutQuad; delay: 1600;"
          animation__fade="property: components.material.material.opacity; from: 0.3; to: 0; dur: 2700; loop: true; easing: easeInQuad; delay: 1600;"
          animation__grow="property: scale; from: 1 1 1; to: 2.3 2.3 2.3; dur: 2700; loop: true; easing: easeOutQuad; delay: 1600;"
        ></a-sphere>

      </a-entity>

      <!-- 🙏 Shiva — popup wrapper -->
      <a-entity id="shiva-wrapper" position="0 0 0" scale="0 0 0">
        <a-entity position="0 0 0.15" rotation="90 0 0">
          <a-gltf-model
            id="shiva-model"
            src="#shiva"
            position="0 0 0"
            rotation="0 270 0"
            scale="0.5 0.5 0.5"
          ></a-gltf-model>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    const statusEl      = document.getElementById("status");
    const scene         = document.querySelector("a-scene");
    const modelEl       = document.getElementById("shiva-model");
    const sunEl         = document.getElementById("sun-model");
    const techEl        = document.getElementById("tech-model");
    const shivaWrapper  = document.getElementById("shiva-wrapper");
    const smokeContainer= document.getElementById("smoke-container");
    const targetEl      = document.querySelector("[mindar-image-target]");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }

    function showSmoke() { smokeContainer.setAttribute("visible", "true"); }
    function hideSmoke() { smokeContainer.setAttribute("visible", "false"); }

    // ── Popup animation ───────────────────────────────────────────────────
    function playPopupAnimation() {
      shivaWrapper.setAttribute("scale",    "0 0 0");
      shivaWrapper.setAttribute("position", "0 0 -0.05");

      setTimeout(() => {
        shivaWrapper.setAttribute("animation__scale", `
          property: scale; from: 0 0 0; to: 1.1 1.1 1.1;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__settle", `
          property: scale; from: 1.1 1.1 1.1; to: 1 1 1;
          dur: 250; easing: easeInOutQuad; delay: 700; startEvents: startPopup;
        `);
        shivaWrapper.setAttribute("animation__rise", `
          property: position; from: 0 0 -0.08; to: 0 0 0;
          dur: 700; easing: easeOutCubic; startEvents: startPopup;
        `);

        shivaWrapper.emit("startPopup");

        // Smoke appears as Shiva rises
        setTimeout(() => showSmoke(), 300);

      }, 50);
    }

    // ── Model events ──────────────────────────────────────────────────────
    if (modelEl) {
      modelEl.addEventListener("model-loaded", () => {
        showStatus("✅ Model loaded — scan the marker!");
        console.log("✅ Shiva GLB loaded");
      });
      modelEl.addEventListener("model-error", (e) => {
        showStatus("❌ Shiva model failed to load");
        console.error("Shiva model error:", e);
      });
    }

    if (sunEl) {
      sunEl.addEventListener("model-loaded", () => console.log("✅ Sun GLB loaded"));
      sunEl.addEventListener("model-error",  (e) => console.error("Sun error:", e));
    }

    if (techEl) {
      techEl.addEventListener("model-loaded", () => console.log("✅ Tech base GLB loaded"));
      techEl.addEventListener("model-error",  (e) => console.error("Tech error:", e));
    }

    // ── Target found / lost ───────────────────────────────────────────────
    if (targetEl) {
      targetEl.addEventListener("targetFound", () => {
        showStatus("🙏 Om Namah Shivaya!");
        setTimeout(() => statusEl.classList.add("hidden"), 3000);
        playPopupAnimation();
      });

      targetEl.addEventListener("targetLost", () => {
        showStatus("🔍 Point camera at the marker...");
        shivaWrapper.setAttribute("scale", "0 0 0");
        hideSmoke();
      });
    }

    // ── AR ready / error ──────────────────────────────────────────────────
    if (scene) {
      scene.addEventListener("arReady", () => {
        showStatus("📷 Camera ready — scan the marker!");
        console.log("✅ AR ready, camera active");
      });
      scene.addEventListener("arError", (e) => {
        showStatus("❌ Camera failed — allow permission & use HTTPS");
        console.error("AR Error:", e);
      });
    }
  </script>

</body>
</html>
